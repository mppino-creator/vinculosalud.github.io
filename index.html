<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7B8471" />
    <title>Vínculo Salud · En mantención</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 650px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            text-align: center;
        }
        .icon {
            font-size: 4rem;
            color: #f1c40f;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.2rem;
            color: #1e293b;
            margin-bottom: 12px;
            font-weight: 700;
        }
        .sub {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .contacto {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0 20px;
            font-size: 1.05rem;
            color: #334155;
        }
        .contacto i {
            color: var(--primario, #7B8471);
            width: 28px;
            text-align: center;
        }
        .contacto a {
            color: #1e293b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .contacto a:hover {
            color: #E88D5B;
        }
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.05rem;
            text-decoration: none;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .whatsapp-btn:hover {
            background: #1ebe5d;
        }
        .footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: #94a3b8;
            border-top: 1px solid #e9edf2;
            padding-top: 25px;
        }
        .footer i {
            color: #E88D5B;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">
        <i class="fa fa-tools"></i>
    </div>
    <h1>🔧 En mantención</h1>
    <p class="sub">
        Estamos realizando mejoras en nuestro sitio web.<br />
        Por favor, contáctanos directamente para agendar tu hora.
    </p>

    <div class="contacto">
        <div><i class="fa fa-phone"></i> +56 9 3209 3724</div>
        <div><i class="fa fa-envelope"></i> <a href="mailto:vinculosalud@hotmail.com">vinculosalud@hotmail.com</a></div>
        <div><i class="fa fa-map-marker-alt"></i> Av. Principal 123, Santiago</div>
    </div>

    <a href="https://wa.me/56932093724" target="_blank" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> Escríbenos por WhatsApp
    </a>

    <div class="footer">
        <i class="fa fa-heart" style="color: #E88D5B;"></i> Vínculo Salud · Centro de Bienestar
    </div>
</div>

</body>
</html>
