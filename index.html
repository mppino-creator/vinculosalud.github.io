<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo Salud - Gestión Integral</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--primary); }
        .app-container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .admin-box { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-top: 15px; }
        .user-card { background: white; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid var(--accent); }
        .user-info { margin-bottom: 10px; font-size: 14px; line-height: 1.6; }
        .slot-card { background: #e8f4fd; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        h2, h3 { color: var(--accent); text-align: center; margin-top: 0; }
        .btn-danger { background: #e74c3c !important; }
        .btn-success { background: #27ae60 !important; }
        .flex-row { display: flex; gap: 5px; align-items: center; }
        .label-small { font-size: 12px; color: #7f8c8d; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Vínculo Salud</h2>

    <div id="login-section">
        <p style="text-align: center; color: #666;">Ingreso al Sistema</p>
        <input type="text" id="user-login" placeholder="Usuario">
        <input type="password" id="pass-login" placeholder="Contraseña">
        <button onclick="intentarLogin()">Entrar</button>
    </div>

    <div id="admin-section" class="hidden">
        <h3>Panel Administrador</h3>
        <div class="admin-box">
            <p><strong>Registrar Nuevo Profesional:</strong></p>
            <input type="text" id="reg-user" placeholder="Nombre de Usuario (ej: alison.g)">
            <input type="text" id="reg-name" placeholder="Nombre Real (ej: Alison Gutiérrez)">
            <input type="text" id="reg-pass" placeholder="Clave Inicial">
            <button onclick="crearUsuario()" class="btn-success">Crear en Base de Datos</button>
        </div>

        <div class="admin-box">
            <p><strong>Gestión de Credenciales (Staff):</strong></p>
            <div id="lista-admin-usuarios">Cargando profesionales...</div>
        </div>
        
        <button onclick="logout()" class="btn-danger" style="margin-top: 20px;">Cerrar Sesión</button>
    </div>

    <div id="psyc-section" class="hidden">
        <h3 id="psyc-welcome">Bienvenido</h3>
        
        <div class="admin-box">
            <p><strong>Editar Mis Datos Personales:</strong></p>
            <span class="label-small">Nombre Público:</span>
            <input type="text" id="edit-my-name" placeholder="Tu nombre real">
            <span class="label-small">Nueva Contraseña:</span>
            <input type="text" id="edit-my-pass" placeholder="Cambiar mi clave">
            <button onclick="actualizarMisDatos()" class="btn-success">Guardar mis cambios</button>
        </div>

        <div class="admin-box">
            <p><strong>Horas de Box:</strong></p>
            <div id="lista-horas">Próximamente gestión de box...</div>
        </div>

        <button onclick="logout()" class="btn-danger" style="margin-top: 20px;">Cerrar Sesión</button>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "vinculosaludapp.firebaseapp.com",
        databaseURL: "https://vinculosaludapp-default-rtdb.firebaseio.com",
        projectId: "vinculosaludapp",
        storageBucket: "vinculosaludapp.appspot.com",
        appId: "TU_APP_ID"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let idSesionActiva = null;

    function intentarLogin() {
        const u = document.getElementById('user-login').value.trim();
        const p = document.getElementById('pass-login').value.trim();

        if(u === "Admin" && p === "Nina2026") {
            abrirSeccion('admin-section');
            escucharUsuariosAdmin();
            return;
        }

        db.ref('Staff').once('value', snapshot => {
            let encontrado = false;
            snapshot.forEach(child => {
                const d = child.val();
                if(d.usuario === u && d.pass === p) {
                    encontrado = true;
                    idSesionActiva = child.key;
                    document.getElementById('psyc-welcome').innerText = "Panel de " + d.name;
                    document.getElementById('edit-my-name').value = d.name;
                    document.getElementById('edit-my-pass').value = d.pass;
                    abrirSeccion('psyc-section');
                }
            });
            if(!encontrado) alert("Error: Usuario o clave no coinciden.");
        });
    }

    // --- ACCIONES DEL ADMINISTRADOR ---

    function crearUsuario() {
        const usuario = document.getElementById('reg-user').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();

        if(usuario && name && pass) {
            db.ref('Staff').push({ usuario, name, pass });
            alert("Profesional registrado.");
            document.getElementById('reg-user').value = "";
            document.getElementById('reg-name').value = "";
            document.getElementById('reg-pass').value = "";
        }
    }

    function escucharUsuariosAdmin() {
        db.ref('Staff').on('value', snapshot => {
            const div = document.getElementById('lista-admin-usuarios');
            div.innerHTML = "";
            snapshot.forEach(child => {
                const u = child.val();
                const id = child.key;
                div.innerHTML += `
                    <div class="user-card">
                        <div class="user-info">
                            <strong>Nombre:</strong> ${u.name}<br>
                            <strong>Acceso:</strong> ${u.usuario} / ${u.pass}
                        </div>
                        <span class="label-small">Modificar Usuario:</span>
                        <input type="text" id="admin-mod-user-${id}" value="${u.usuario}">
                        <span class="label-small">Modificar Clave:</span>
                        <input type="text" id="admin-mod-pass-${id}" value="${u.pass}">
                        <div class="flex-row">
                            <button onclick="adminActualizarStaff('${id}')" class="btn-success">Actualizar</button>
                            <button onclick="eliminarUsuario('${id}')" class="btn-danger">Eliminar</button>
                        </div>
                    </div>`;
            });
        });
    }

    function adminActualizarStaff(id) {
        const nuevoUser = document.getElementById('admin-mod-user-' + id).value;
        const nuevaPass = document.getElementById('admin-mod-pass-' + id).value;
        if(nuevoUser && nuevaPass) {
            db.ref('Staff/' + id).update({ usuario: nuevoUser, pass: nuevaPass });
            alert("Credenciales actualizadas por Administrador");
        }
    }

    function eliminarUsuario(id) {
        if(confirm("¿Eliminar definitivamente a este profesional?")) {
            db.ref('Staff/' + id).remove();
        }
    }

    // --- ACCIONES DEL PROFESIONAL ---

    function actualizarMisDatos() {
        const nuevoNombre = document.getElementById('edit-my-name').value.trim();
        const nuevaClave = document.getElementById('edit-my-pass').value.trim();
        
        if(nuevoNombre && nuevaClave && idSesionActiva) {
            db.ref('Staff/' + idSesionActiva).update({ 
                name: nuevoNombre, 
                pass: nuevaClave 
            });
            alert("Tus datos han sido actualizados con éxito.");
        }
    }

    function abrirSeccion(id) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
