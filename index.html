<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vínculo Salud - Gestión Profesionales</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
</head>
<body>
    <h2>Gestión de Profesionales</h2>
    
    <!-- Formulario para agregar profesional -->
    <div style="border:1px solid black; padding:10px; margin-bottom:20px;">
        <h3>Agregar Profesional</h3>
        <input type="text" id="nombre" placeholder="Nombre completo"><br><br>
        <input type="text" id="especialidad" placeholder="Especialidad"><br><br>
        <input type="text" id="usuario" placeholder="Usuario"><br><br>
        <input type="text" id="password" placeholder="Contraseña"><br><br>
        <input type="number" id="precioOnline" placeholder="Precio Online"><br><br>
        <input type="number" id="precioPresencial" placeholder="Precio Presencial"><br><br>
        <button onclick="guardarProfesional()">Guardar Profesional</button>
    </div>
    
    <!-- Lista de profesionales -->
    <div style="border:1px solid black; padding:10px;">
        <h3>Lista de Profesionales</h3>
        <div id="listaProfesionales"></div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCj5jdc_FQ1H0l78VJj3qBmGYsGrSete3U",
            authDomain: "vinculosaludapp.firebaseapp.com",
            databaseURL: "https://vinculosaludapp-default-rtdb.firebaseio.com",
            projectId: "vinculosaludapp",
            storageBucket: "vinculosaludapp.firebasestorage.app",
            messagingSenderId: "405876668483",
            appId: "1:405876668483:web:8f19aef4dd63a70ecdbcf6"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Función para guardar profesional
        function guardarProfesional() {
            // Obtener valores del formulario
            const nombre = document.getElementById('nombre').value;
            const especialidad = document.getElementById('especialidad').value;
            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;
            const precioOnline = document.getElementById('precioOnline').value;
            const precioPresencial = document.getElementById('precioPresencial').value;
            
            // Validar campos obligatorios
            if (!nombre || !usuario || !password) {
                alert('Nombre, usuario y contraseña son obligatorios');
                return;
            }
            
            // Crear objeto profesional
            const profesional = {
                id: Date.now(),
                nombre: nombre,
                especialidad: especialidad || '',
                usuario: usuario,
                password: password,
                precioOnline: parseInt(precioOnline) || 0,
                precioPresencial: parseInt(precioPresencial) || 0
            };
            
            // Guardar en Firebase
            database.ref('profesionales/' + profesional.id).set(profesional);
            
            // Limpiar formulario
            document.getElementById('nombre').value = '';
            document.getElementById('especialidad').value = '';
            document.getElementById('usuario').value = '';
            document.getElementById('password').value = '';
            document.getElementById('precioOnline').value = '';
            document.getElementById('precioPresencial').value = '';
            
            alert('Profesional guardado');
        }

        // Función para eliminar profesional
        function eliminarProfesional(id) {
            if (confirm('¿Eliminar profesional?')) {
                database.ref('profesionales/' + id).remove();
            }
        }

        // Escuchar cambios en Firebase
        database.ref('profesionales').on('value', function(snapshot) {
            const data = snapshot.val();
            const lista = document.getElementById('listaProfesionales');
            
            if (!data) {
                lista.innerHTML = '<p>No hay profesionales</p>';
                return;
            }
            
            // Convertir objeto a array
            const profesionales = Object.values(data);
            
            // Crear tabla HTML
            let html = '<table border="1" cellpadding="8" style="border-collapse:collapse; width:100%;">';
            html += '<tr><th>Nombre</th><th>Especialidad</th><th>Usuario</th><th>Precio Online</th><th>Precio Presencial</th><th>Acción</th></tr>';
            
            profesionales.forEach(p => {
                html += '<tr>';
                html += '<td>' + (p.nombre || '') + '</td>';
                html += '<td>' + (p.especialidad || '') + '</td>';
                html += '<td>' + (p.usuario || '') + '</td>';
                html += '<td>$' + (p.precioOnline || 0) + '</td>';
                html += '<td>$' + (p.precioPresencial || 0) + '</td>';
                html += '<td><button onclick="eliminarProfesional(' + p.id + ')">Eliminar</button></td>';
                html += '</tr>';
            });
            
            html += '</table>';
            lista.innerHTML = html;
        });
    </script>
</body>
</html>
