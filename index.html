<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vínculo Salud - Gestión</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--primary); }
        .app-container { max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
        .admin-box { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-top: 15px; }
        .user-card { background: white; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid var(--accent); }
        .user-info { margin-bottom: 10px; font-size: 14px; }
        .slot-card { background: #e8f4fd; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        h2, h3 { color: var(--accent); text-align: center; margin-top: 0; }
        .btn-danger { background: #e74c3c !important; }
        .btn-success { background: #27ae60 !important; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Vínculo Salud</h2>

    <div id="login-section">
        <p style="text-align: center; color: #666;">Ingreso al Sistema</p>
        <input type="text" id="user-login" placeholder="Usuario">
        <input type="password" id="pass-login" placeholder="Contraseña">
        <button onclick="intentarLogin()">Entrar</button>
    </div>

    <div id="admin-section" class="hidden">
        <h3>Panel Administrador</h3>
        <div class="admin-box">
            <p><strong>Registrar Nuevo Psicólogo:</strong></p>
            <input type="text" id="reg-user" placeholder="Usuario (Ej: alison.g)">
            <input type="text" id="reg-name" placeholder="Nombre Real (Ej: Alison G.)">
            <input type="text" id="reg-pass" placeholder="Clave">
            <button onclick="crearUsuario()" class="btn-success">Crear en Base de Datos</button>
        </div>

        <div class="admin-box">
            <p><strong>Gestión de Usuarios Existentes:</strong></p>
            <div id="lista-admin-usuarios">Cargando...</div>
        </div>
        
        <button onclick="logout()" class="btn-danger" style="margin-top: 20px;">Cerrar Sesión</button>
    </div>

    <div id="psyc-section" class="hidden">
        <h3 id="psyc-welcome">Bienvenido</h3>
        
        <div class="admin-box">
            <p><strong>Mis Datos Personales:</strong></p>
            <div id="mis-datos"></div>
            <input type="text" id="new-own-pass" placeholder="Nueva Clave">
            <button onclick="actualizarMiClave()">Cambiar mi Contraseña</button>
        </div>

        <div class="admin-box">
            <p><strong>Horas Disponibles para Box:</strong></p>
            <div id="lista-horas"></div>
        </div>

        <button onclick="logout()" class="btn-danger" style="margin-top: 20px;">Cerrar Sesión</button>
    </div>
</div>

<script>
    // IMPORTANTE: Pon tus datos de Firebase aquí
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "vinculosaludapp.firebaseapp.com",
        databaseURL: "https://vinculosaludapp-default-rtdb.firebaseio.com",
        projectId: "vinculosaludapp",
        storageBucket: "vinculosaludapp.appspot.com",
        appId: "TU_APP_ID"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let usuarioLogueadoId = null;

    function intentarLogin() {
        const u = document.getElementById('user-login').value.trim();
        const p = document.getElementById('pass-login').value.trim();

        if(u === "Admin" && p === "Nina2026") {
            abrirSeccion('admin-section');
            escucharUsuariosAdmin();
            return;
        }

        db.ref('Staff').once('value', snapshot => {
            let encontrado = false;
            snapshot.forEach(child => {
                const d = child.val();
                if(d.usuario === u && d.pass === p) {
                    encontrado = true;
                    usuarioLogueadoId = child.key;
                    document.getElementById('psyc-welcome').innerText = "Hola, " + d.name;
                    document.getElementById('mis-datos').innerHTML = `
                        <p><strong>Usuario:</strong> ${d.usuario}</p>
                        <p><strong>Nombre:</strong> ${d.name}</p>`;
                    abrirSeccion('psyc-section');
                    // Aquí cargarías las horas...
                }
            });
            if(!encontrado) alert("Usuario o clave incorrecta");
        });
    }

    // --- FUNCIONES PARA TI (ADMIN) ---

    function crearUsuario() {
        const usuario = document.getElementById('reg-user').value;
        const name = document.getElementById('reg-name').value;
        const pass = document.getElementById('reg-pass').value;

        if(usuario && name && pass) {
            db.ref('Staff').push({ usuario, name, pass });
            alert("Usuario creado exitosamente");
            document.getElementById('reg-user').value = "";
            document.getElementById('reg-name').value = "";
            document.getElementById('reg-pass').value = "";
        }
    }

    function escucharUsuariosAdmin() {
        db.ref('Staff').on('value', snapshot => {
            const div = document.getElementById('lista-admin-usuarios');
            div.innerHTML = "";
            snapshot.forEach(child => {
                const u = child.val();
                const id = child.key;
                div.innerHTML += `
                    <div class="user-card">
                        <div class="user-info">
                            <strong>${u.name}</strong> (@${u.usuario})<br>
                            Clave: ${u.pass}
                        </div>
                        <input type="text" id="mod-pass-${id}" placeholder="Nueva clave" style="width:70%; display:inline;">
                        <button onclick="modificarClaveAdmin('${id}')" style="width:25%; display:inline;">OK</button>
                        <button onclick="eliminarUsuario('${id}')" class="btn-danger" style="margin-top:5px;">Eliminar Usuario</button>
                    </div>`;
            });
        });
    }

    function modificarClaveAdmin(id) {
        const nueva = document.getElementById('mod-pass-' + id).value;
        if(nueva) {
            db.ref('Staff/' + id).update({ pass: nueva });
            alert("Clave actualizada");
        }
    }

    function eliminarUsuario(id) {
        if(confirm("¿Seguro que quieres borrar a este profesional?")) {
            db.ref('Staff/' + id).remove();
        }
    }

    // --- FUNCIONES PARA ELLOS (PSICÓLOGOS) ---

    function actualizarMiClave() {
        const nueva = document.getElementById('new-own-pass').value;
        if(nueva && usuarioLogueadoId) {
            db.ref('Staff/' + usuarioLogueadoId).update({ pass: nueva });
            alert("Tu clave ha sido cambiada.");
            document.getElementById('new-own-pass').value = "";
        }
    }

    function abrirSeccion(id) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
