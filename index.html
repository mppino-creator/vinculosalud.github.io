<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7B8471" />
    <title>Vínculo Salud · En mantención</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 700px;
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }
        .icon {
            font-size: 4rem;
            color: #f1c40f;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
        }
        p {
            font-size: 1.15rem;
            color: #475569;
            line-height: 1.7;
            margin-bottom: 25px;
        }
        .contacto {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .contacto a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 12px 24px;
            border-radius: 50px;
            color: #1e293b;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s ease;
            font-size: 1rem;
        }
        .contacto a:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }
        .contacto i {
            font-size: 1.2rem;
            color: #7B8471;
        }
        .whatsapp {
            background: #25D366 !important;
            color: white !important;
        }
        .whatsapp i {
            color: white !important;
        }
        .whatsapp:hover {
            background: #1ebe5d !important;
        }
        .email {
            background: #5b8db8 !important;
            color: white !important;
        }
        .email i {
            color: white !important;
        }
        .email:hover {
            background: #4a7aa3 !important;
        }
        .footer {
            margin-top: 30px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.7rem;
            }
            .contacto a {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">
        <i class="fa fa-tools"></i>
    </div>
    <h1>🔧 Sitio en mantención</h1>
    <p>
        Por el momento, nuestro sistema de reservas online está desactivado.<br />
        Si deseas agendar una hora o consultar por nuestros servicios, por favor contáctanos directamente:
    </p>

    <div class="contacto">
        <a href="https://wa.me/56932093724" target="_blank" class="whatsapp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
        <a href="mailto:vinculosalud@hotmail.com" class="email">
            <i class="fa fa-envelope"></i> Correo
        </a>
        <a href="tel:+56932093724">
            <i class="fa fa-phone"></i> Llamar
        </a>
    </div>

    <div class="footer">
        <p>Vínculo Salud · Centro de Bienestar</p>
        <p style="margin-top: 6px; font-size: 0.8rem;">Pronto volveremos con más novedades</p>
    </div>
</div>

</body>
</html>
